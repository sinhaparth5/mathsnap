<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathSnap CDN Demo</title>
    <link rel="stylesheet" href="./mathsnap.min.css" />
    <style>
      :root {
        color-scheme: light;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top, #f3efe6 0%, #f7f4ee 35%, #ece4d8 100%);
        color: #1d1b18;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(900px, 100%);
        background: rgba(255, 252, 247, 0.88);
        border: 1px solid rgba(94, 72, 44, 0.18);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 24px 80px rgba(70, 49, 24, 0.14);
        backdrop-filter: blur(8px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 0.95;
      }

      p {
        margin: 0 0 20px;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      pre {
        margin: 24px 0 0;
        padding: 16px;
        overflow: auto;
        border-radius: 16px;
        background: #201a15;
        color: #f5ede0;
      }

      code {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      #math {
        margin: 24px 0;
        padding: 24px;
        border-radius: 18px;
        background: linear-gradient(180deg, #fffdf9 0%, #f5ede2 100%);
        border: 1px solid rgba(94, 72, 44, 0.14);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MathSnap Browser Build</h1>
      <p>
        This page is served from GitHub Pages and uses the browser bundle directly.
      </p>

      <div id="math"></div>

      <pre><code>&lt;link rel="stylesheet" href="./mathsnap.min.css" /&gt;
&lt;script src="./browser/mathsnap.min.js"&gt;&lt;/script&gt;</code></pre>
    </main>

    <script src="./browser/mathsnap.min.js"></script>
    <script>
      const result = MathSnap.renderMath({
        equation: String.raw`\int_0^1 x^2 \, dx = \frac{1}{3}`,
        displayMode: true,
      });

      document.getElementById('math').innerHTML = result.html;
    </script>
  </body>
  </html>
